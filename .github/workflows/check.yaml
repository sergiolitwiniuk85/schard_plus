# Workflow for R CMD check
#
# Needed to get schard plus onto CI.
#
# Author: sergiolitwiniuk85
on:
  push:
    branches: [main, mejora/*]
  pull_request:
    branches: [main]

name: R CMD check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}
          - {os: macos-latest, r: 'release'}

    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      RSPM: ${{ matrix.config.rspm }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::BiocManager
          needs: check

      - name: Install Bioconductor dependencies
        run: |
          BiocManager::install(c("rhdf5", "SingleCellExperiment"), ask = FALSE, update = FALSE)
        shell: Rscript {0}

      - uses: r-lib/actions/check-r-package@v2
