name: R CMD check (schardExplorer)

on:
  push:
    branches: [main, mejora/*]
  pull_request:
    branches: [main]

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev
      - name: Install schard
        run: |
          install.packages("BiocManager")
          BiocManager::install(c("rhdf5", "Matrix"), ask = FALSE)
          install.packages("remotes")
          remotes::install_local("schard", dependencies = FALSE)
        shell: Rscript {0}
      - name: Install schardExplorer deps
        run: |
          remotes::install_deps("schardExplorer", dependencies = TRUE)
        shell: Rscript {0}
      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: schardExplorer
